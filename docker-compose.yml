services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gogol
      POSTGRES_PASSWORD: gogol
      POSTGRES_DB: gogol_mogol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gogol:gogol@db:5432/gogol_mogol

volumes:
  pgdata:
